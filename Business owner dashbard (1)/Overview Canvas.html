<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Loopr — Overview Canvas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    html, body { margin: 0; padding: 0; font-family: "Geist", system-ui, sans-serif; background: #FAFAFB; }
    .canvas-hint {
      position: fixed; top: 16px; left: 16px;
      z-index: 5;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid #E6E6EE;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12.5px;
      color: #585966;
      max-width: 360px;
      box-shadow: 0 4px 16px rgba(15,17,32,0.06);
    }
    .canvas-hint b { color: #0A0B14; }
    .canvas-hint a { color: #6366F1; font-weight: 500; }
    .iframe-wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      background: #FFFFFF;
      border-radius: 14px;
    }
    .iframe-wrap iframe {
      border: 0;
      display: block;
      width: 1200px;
      height: 1500px;
      transform-origin: top left;
      pointer-events: none;
    }
    .iframe-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 14px;
      box-shadow: inset 0 0 0 1px rgba(15,17,32,0.04);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="canvas-hint">
    <div><b>Loopr — Overview canvas</b></div>
    <div style="margin-top: 4px">All 12 screens at a glance. Pan with drag, zoom with scroll. Click an artboard to focus, or
      <a href="index.html">open the live prototype →</a>
    </div>
  </div>

  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel">
    function Frame({ slug, scale = 0.66, w = 1200, h = 1500 }) {
      return (
        <div className="iframe-wrap">
          <iframe
            src={`index.html?solo=${slug}#${slug}`}
            style={{ width: w, height: h, transform: `scale(${scale})` }}
            scrolling="no"
          />
        </div>
      );
    }

    const SCREENS = [
      { id: "dashboard",     label: "1 · Dashboard Home",       slug: "dashboard",     w: 1100, h: 1700, section: "overview" },
      { id: "analytics",     label: "8 · Analytics",            slug: "analytics",     w: 1100, h: 1900, section: "overview" },
      { id: "history",       label: "5 · Review History",       slug: "history",       w: 1100, h: 1500, section: "overview" },

      { id: "funnel",        label: "4 · Funnel Manager",       slug: "funnel",        w: 1100, h: 1300, section: "funnel" },
      { id: "qr",            label: "6 · QR Dashboard",         slug: "qr",            w: 1100, h: 1600, section: "funnel" },
      { id: "qr-request",    label: "7 · QR Request",           slug: "qr-request",    w: 1100, h: 1700, section: "funnel" },

      { id: "onboarding",    label: "2 · Business Onboarding",  slug: "onboarding",    w: 1100, h: 1100, section: "account" },
      { id: "profile",       label: "3 · Business Profile",     slug: "profile",       w: 1100, h: 1400, section: "account" },
      { id: "billing",       label: "9 · Subscription & Billing", slug: "billing",     w: 1100, h: 1800, section: "account" },

      { id: "usage",         label: "10 · Usage Tracking",      slug: "usage",         w: 1100, h: 1500, section: "ops" },
      { id: "notifications", label: "11 · Notifications",       slug: "notifications", w: 1100, h: 1200, section: "ops" },
      { id: "settings",      label: "12 · Settings",            slug: "settings",      w: 1100, h: 1300, section: "ops" },
    ];

    const SECTIONS = [
      { id: "overview", title: "Overview",       subtitle: "Dashboard, analytics, customer review history" },
      { id: "funnel",   title: "Funnel & QR",    subtitle: "Customer review funnel + QR campaign management" },
      { id: "account",  title: "Account & money",subtitle: "Onboarding, profile, billing" },
      { id: "ops",      title: "Operations",     subtitle: "Usage, notifications, settings" },
    ];

    function CanvasApp() {
      const SCALE = 0.62;
      const ARTBOARD_W = 700;
      return (
        <DesignCanvas backgroundColor="#FAFAFB">
          {SECTIONS.map(sec => (
            <DCSection key={sec.id} id={sec.id} title={sec.title} subtitle={sec.subtitle}>
              {SCREENS.filter(s => s.section === sec.id).map(s => (
                <DCArtboard
                  key={s.id}
                  id={s.id}
                  label={s.label}
                  width={Math.round(s.w * SCALE)}
                  height={Math.round(s.h * SCALE)}>
                  <Frame slug={s.slug} scale={SCALE} w={s.w} h={s.h}/>
                </DCArtboard>
              ))}
            </DCSection>
          ))}
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<CanvasApp/>);
  </script>
</body>
</html>
