name: E2E Tests

# Runs on PR and push to main — only when test Supabase secrets are configured.
# If E2E_SUPABASE_URL is absent the job skips gracefully.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Skip when the required secrets haven't been set up yet
    if: vars.E2E_ENABLED == 'true'

    env:
      NEXT_PUBLIC_SUPABASE_URL:          ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:         ${{ secrets.E2E_SUPABASE_SERVICE_ROLE }}
      NEXT_PUBLIC_APP_URL:               http://localhost:3000
      TEST_QR_TOKEN:                     ${{ secrets.E2E_TEST_QR_TOKEN }}
      # Rate limiter falls back to in-memory in test environment
      UPSTASH_REDIS_REST_URL:            ''
      UPSTASH_REDIS_REST_TOKEN:          ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
