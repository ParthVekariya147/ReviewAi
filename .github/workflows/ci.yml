name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Stub values so Next.js build resolves env imports without real secrets.
      # These are NOT used at runtime — only satisfy static analysis during build.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder-token

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check for schema drift
        run: |
          if [ -n "$SUPABASE_PROJECT_ID" ]; then
            npx supabase gen types typescript \
              --project-id "$SUPABASE_PROJECT_ID" > /tmp/database.gen.ts
            diff src/types/database.gen.ts /tmp/database.gen.ts || \
              (echo "⚠️  Schema drift detected — run npm run db:types and commit the result" && exit 1)
          else
            echo "ℹ️  SUPABASE_PROJECT_ID not set — skipping schema drift check"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
